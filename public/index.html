<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>卡密验证系统</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>卡密验证系统</h1>
        <p>安卓 App 授权、心跳与设备绑定管理</p>
      </div>
      <div class="token-box">
        <label for="adminToken">管理密钥</label>
        <input id="adminToken" type="password" autocomplete="off" value="change_this_admin_token">
      </div>
    </header>

    <section class="stats" aria-label="统计">
      <article><span>总卡密</span><strong id="statTotal">0</strong></article>
      <article><span>未使用</span><strong id="statUnused">0</strong></article>
      <article><span>使用中</span><strong id="statActive">0</strong></article>
      <article><span>过期/禁用</span><strong id="statClosed">0</strong></article>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <h2>生成卡密</h2>
          <p>支持分钟、小时、天、月、年，也可以批量生成。</p>
        </div>
        <button id="refreshBtn" class="ghost" type="button">刷新</button>
      </div>
      <form id="createForm" class="create-grid">
        <label>数量<input name="count" type="number" min="1" max="500" value="5"></label>
        <label>时长<input name="duration" type="number" min="1" value="1"></label>
        <label>
          单位
          <select name="unit">
            <option value="minute">分钟</option>
            <option value="hour">小时</option>
            <option value="day" selected>天</option>
            <option value="month">月</option>
            <option value="year">年</option>
          </select>
        </label>
        <label>备注<input name="note" type="text" maxlength="80" placeholder="例如：1天测试卡"></label>
        <button type="submit">生成</button>
      </form>
      <div id="createdBox" class="created-box" hidden>
        <div class="created-head">
          <strong>刚生成的卡密</strong>
          <button id="copyCreatedBtn" class="ghost small" type="button">复制全部</button>
        </div>
        <textarea id="createdCards" readonly></textarea>
      </div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <label class="search">搜索<input id="searchInput" type="search" placeholder="卡密、设备、备注"></label>
        <label>
          状态
          <select id="statusFilter">
            <option value="all">全部</option>
            <option value="unused">未使用</option>
            <option value="active">使用中</option>
            <option value="expired">已过期</option>
            <option value="disabled">已禁用</option>
          </select>
        </label>
        <button id="deleteAllBtn" class="danger" type="button">删除全部卡密</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>卡密</th>
              <th>状态</th>
              <th>有效期</th>
              <th>设备</th>
              <th>激活/心跳</th>
              <th>备注</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="cardsBody"></tbody>
        </table>
      </div>
      <div id="emptyState" class="empty" hidden>暂无卡密</div>
    </section>
  </main>

  <div id="toast" class="toast" role="status"></div>
  <script src="/app.js"></script>
</body>
</html>
